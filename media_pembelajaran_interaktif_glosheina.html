                            </div>

                        </div>
                    </div>
                `
            }
        ];

        let activeStepIndex = 0;

        // Render Navigation Step Buttons on Left Sidebar
        function renderSidebar() {
            const container = document.getElementById('step-buttons-container');
            container.innerHTML = '';
            
            lessonSteps.forEach((step, idx) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 rounded-xl font-bold text-xs transition-all flex items-center justify-between group ${
                    idx === activeStepIndex 
                    ? 'bg-indigo-600 text-white shadow-md shadow-indigo-100' 
                    : 'text-slate-600 hover:bg-slate-50'
                }`;
                btn.innerHTML = `
                    <span>${idx + 1}. ${step.title}</span>
                    <span class="opacity-0 group-hover:opacity-100 transition-opacity text-[10px]">&rarr;</span>
                `;
                btn.onclick = () => {
                    activeStepIndex = idx;
                    loadActiveStep();
                };
                container.appendChild(btn);
            });
        }

        // Load the currently selected lesson step to the layout
        function loadActiveStep() {
            const step = lessonSteps[activeStepIndex];
            const contentArea = document.getElementById('lesson-content-area');
            
            // Fade effect
            contentArea.style.opacity = 0;
            setTimeout(() => {
                contentArea.innerHTML = step.html;
                contentArea.style.opacity = 1;
                
                // Set Global Progress
                document.getElementById('progress-percentage').innerText = `${step.progress}%`;
                document.getElementById('progress-bar-fill').style.width = `${step.progress}%`;
                
                // Initialize specific triggers for widgets if present
                if (step.id === 3) {
                    initBatteryWidget();
                }
                
                // Typeset math equation beautifully
                triggerMathTypeset();
            }, 200);

            renderSidebar();
        }

        // Global Navigation Click Listeners
        document.getElementById('prev-step-btn').onclick = () => {
            if (activeStepIndex > 0) {
                activeStepIndex--;
                loadActiveStep();
            }
        };

        document.getElementById('next-step-btn').onclick = () => {
            if (activeStepIndex < lessonSteps.length - 1) {
                activeStepIndex++;
                loadActiveStep();
            } else {
                triggerConfetti();
            }
        };

        // --- Interactive WarmUp Validations ---
        function checkWarmUp(inputId, correctAnswers) {
            const input = document.getElementById(inputId);
            const val = input.value.trim().toLowerCase();
            
            const isMatch = correctAnswers.some(ans => val === ans.trim().toLowerCase());
            
            if (isMatch) {
                input.className = "px-4 py-2 rounded-xl border border-emerald-300 bg-emerald-50 text-emerald-800 font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500 w-32 text-center";
            } else {
                input.className = "px-4 py-2 rounded-xl border border-rose-300 bg-rose-50 text-rose-800 font-bold focus:outline-none focus:ring-2 focus:ring-rose-500 w-32 text-center";
            }
        }

        function checkSelectedOption(btnElement, isCorrect) {
            const parent = btnElement.parentElement;
            const buttons = parent.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.className = "p-2 border border-slate-200 rounded-xl font-bold text-xs text-slate-400 bg-slate-50 cursor-not-allowed";
            });
            
            if (isCorrect) {
                btnElement.className = "p-2 border-2 border-emerald-500 bg-emerald-50 rounded-xl font-black text-xs text-emerald-800";
            } else {
                btnElement.className = "p-2 border-2 border-rose-500 bg-rose-50 rounded-xl font-black text-xs text-rose-800";
            }
        }

        // --- Interactive Widget 1: Battery HP Level ---
        function initBatteryWidget() {
            const slider = document.getElementById('battery-slider');
            const fill = document.getElementById('battery-fill');
            const text = document.getElementById('battery-text');
            const compareText = document.getElementById('battery-compare-text');

            slider.oninput = function() {
                const val = parseFloat(this.value);
                const pct = Math.round(val * 100);
                
                fill.style.width = `${pct}%`;
                text.innerText = val.toString().replace('.', ',');
                
                // Adjust colors based on battery limits
                if (pct <= 20) {
                    fill.className = "h-full bg-rose-500 rounded-lg transition-all duration-300";
                } else if (pct <= 50) {
                    fill.className = "h-full bg-amber-500 rounded-lg transition-all duration-300";
                } else {
                    fill.className = "h-full bg-emerald-500 rounded-lg transition-all duration-300";
                }

                // Dynamic comparison string
                if (pct < 20) {
                    compareText.innerHTML = `Level Baterai: ${val.toString().replace('.', ',')} sama nilainya dengan ${pct}% (<span class="text-rose-600 font-bold">Lebih kecil</span> dari 20%)`;
                } else if (pct > 20) {
                    compareText.innerHTML = `Level Baterai: ${val.toString().replace('.', ',')} sama nilainya dengan ${pct}% (<span class="text-emerald-600 font-bold">Lebih besar</span> dari 20%)`;
                } else {
                    compareText.innerHTML = `Level Baterai: ${val.toString().replace('.', ',')} sama nilainya dengan ${pct}% (<span class="text-slate-600 font-bold">Sama persis</span> dengan 20%)`;
                }
            };
        }

        // --- Interactive Widget 2: Mall Promos ---
        function toggleStorePromo(store) {
            const a = document.getElementById('promo-a');
            const b = document.getElementById('promo-b');
            const aDesc = document.getElementById('promo-a-desc');
            const bDesc = document.getElementById('promo-b-desc');
            const conclusion = document.getElementById('promo-conclusion');

            if (store === 'A') {
                a.className = "p-4 bg-purple-50 border-2 border-purple-500 rounded-2xl text-center cursor-pointer transition-all";
                aDesc.classList.remove('hidden');
            } else {
                b.className = "p-4 bg-indigo-50 border-2 border-indigo-500 rounded-2xl text-center cursor-pointer transition-all";
                bDesc.classList.remove('hidden');
            }

            if (!aDesc.classList.contains('hidden') && !bDesc.classList.contains('hidden')) {
                conclusion.classList.remove('hidden');
                triggerMathTypeset();
            }
        }

        // --- Interactive Widget 3: Live Conversion Bridge ---
        function calculateLiveConversion() {
            const num = parseFloat(document.getElementById('frac-num').value);
            const den = parseFloat(document.getElementById('frac-den').value);
            const liveDec = document.getElementById('live-dec');
            const livePct = document.getElementById('live-pct');

            if (!isNaN(num) && !isNaN(den) && den !== 0) {
                const decVal = num / den;
                const roundedDec = Math.round(decVal * 1000) / 1000;
                const pctVal = Math.round(decVal * 100);

                liveDec.innerText = roundedDec.toString().replace('.', ',');
                livePct.innerText = `${pctVal}%`;
            } else {
                liveDec.innerText = "Error";
                livePct.innerText = "Error";
            }
        }

        // --- Homework Accordion ---
        function toggleExpl(id) {
            const panel = document.getElementById(id);
            panel.classList.toggle('hidden');
            triggerMathTypeset();
        }

        // --- Confetti celebration reward animation ---
        function triggerConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            canvas.classList.remove('hidden');
            const ctx = canvas.getContext('2d');
            
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;

            let particles = [];
            const colors = ['#8b5cf6', '#a78bfa', '#f43f5e', '#38bdf8', '#34d399'];

            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 4 + 4,
                    d: Math.random() * canvas.height,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 5
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, i) => {
                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();

                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.tilt = Math.sin(p.d - i) * 3;

                    if (p.y > canvas.height) {
                        particles[i] = {
                            x: Math.random() * canvas.width,
                            y: -20,
                            r: p.r,
                            d: p.d,
                            color: p.color,
                            tilt: p.tilt
                        };
                    }
                });
            }

            let interval = setInterval(draw, 20);
            setTimeout(() => {
                clearInterval(interval);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                canvas.classList.add('hidden');
            }, 4000);
        }

        // Initial launch
        window.onload = function() {
            loadActiveStep();
        };
    </script>
</body>
</html>
