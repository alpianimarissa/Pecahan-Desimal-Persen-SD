        // --- 1. WEB AUDIO API SYNTHESIZER ---
        let audioCtx;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08); 
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16); 
                    osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.24); 
                    gain.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.45);
                } else if (type === 'incorrect') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(140, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.35);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.35);
                } else if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(380, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(280, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.04, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.08);
                }
            } catch (e) {
                console.log("Audio not initialized yet.");
            }
        }

                        <div class="grid grid-cols-3 gap-2 max-w-xs mx-auto">
                            <button onclick="checkSlideAnswer(this, true, 'Hebat! 0,5 + 0,5 - 0,5 = 0,5 (atau setara dengan 1/2).', 10)" class="bg-[#F3F4F6] hover:bg-gray-100 p-2.5 rounded-xl border text-xs font-bold font-mono">0,5</button>
                            <button onclick="checkSlideAnswer(this, false, 'Salah.', 10)" class="bg-[#F3F4F6] hover:bg-gray-100 p-2.5 rounded-xl border text-xs font-bold font-mono">1,0</button>
                            <button onclick="checkSlideAnswer(this, false, 'Kurang tepat.', 10)" class="bg-[#F3F4F6] hover:bg-gray-100 p-2.5 rounded-xl border text-xs font-bold font-mono">0</button>
                        </div>
                    </div>
                `
            },
            // Slide 29: Refleksi Perasaan
            {
                section: "Refleksi",
                title: "Bagaimana Perasaan Belajarmu?",
                subtitle: "Self-Evaluation Kurikulum Merdeka",
                icon: "🌿",
                render: () => `
                    <div class="text-center max-w-xl mx-auto">
                        <p class="text-sm font-bold text-gray-600 mb-6">Pilih emotikon yang mewakili pemahaman operasi FDP-mu hari ini:</p>
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="handleEmotionSelect(this, 'paham')" class="bg-white hover:bg-emerald-50 border-2 border-emerald-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">😎</span>
                                <span class="text-xs font-bold text-gray-600">Sangat Paham</span>
                            </button>
                            <button onclick="handleEmotionSelect(this, 'latihan')" class="bg-white hover:bg-amber-50 border-2 border-amber-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">🤔</span>
                                <span class="text-xs font-bold text-gray-600">Butuh Latihan</span>
                            </button>
                            <button onclick="handleEmotionSelect(this, 'siap')" class="bg-white hover:bg-indigo-50 border-2 border-indigo-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">🔥</span>
                                <span class="text-xs font-bold text-gray-600">Siap Ujian!</span>
                            </button>
                        </div>
                        <p id="emotion-feedback" class="text-xs font-bold text-[#059669] mt-6 min-h-[16px]"></p>
                    </div>
                `
            },
            // Slide 30: Kesimpulan (Misi Selesai!)
            {
                section: "Kesimpulan",
                title: "Misi Operasi FDP Tuntas!",
                subtitle: "Selamat, kamu resmi menjadi Master Pecahan, Desimal, & Persen!",
                icon: "🏆",
                render: () => `
                    <div class="text-center">
                        <span class="text-7xl block mb-3 animate-bounce">👑🏆</span>
                        <h2 class="heading-font text-3xl font-extrabold text-[#065F46] mb-1">Misi Selesai dengan Gemilang!</h2>
                        <p class="text-xs md:text-sm text-gray-600 max-w-md mx-auto mb-6">Kamu telah berhasil melintasi dan menaklukkan 30 slide tantangan interaktif Operasi Campuran FDP Kurikulum Merdeka. Terus asah kemampuan matematika hebatmu!</p>
                        <div onclick="resetAdventure()" class="inline-block bg-gradient-to-r from-[#10B981] to-emerald-600 text-white font-black px-8 py-3 rounded-2xl shadow-lg hover:scale-105 transition duration-300 cursor-pointer text-xs md:text-sm">
                            🔄 RESTART MISI
                        </div>
                    </div>
                `
            }
        ];

        // --- 3. STATE SYSTEM ---
        let currentSlide = 0;
        let score = 0;

        // Canvas Sketchpad Context
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Confetti Context
        const confettiCanvas = document.getElementById('confetti');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettiActive = false;
        let particles = [];

        // --- 4. ENGINE INITIALIZATION ---
        window.onload = function() {
            loadSlide(0);
            initCanvas();
            setupTouchGestures();
        };

        // --- STREAMING_CHUNK: Mengatur penayangan slide secara asinkron... -->
        // --- 5. RENDER CONTROL SYSTEM ---
        function loadSlide(index) {
            if (index < 0 || index >= slides.length) return;
            currentSlide = index;

            const slide = slides[currentSlide];
            
            const headerHtml = `
                <div class="mb-5 border-b-2 border-gray-100 pb-3">
                    <span class="text-xs font-black text-[#10B981] uppercase tracking-widest">${slide.section}</span>
                    <h1 class="heading-font text-2xl md:text-3xl font-extrabold text-slate-800 flex items-center gap-2 mt-1">
                        <span>${slide.icon}</span> ${slide.title}
                    </h1>
                    <p class="text-xs text-gray-400 font-semibold italic">${slide.subtitle}</p>
                </div>
            `;
            
            document.getElementById('slide-content').innerHTML = headerHtml + slide.render();

            // Progress Bar
            const percent = ((currentSlide + 1) / slides.length) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;

            // Footer metadata
            document.getElementById('slide-index').innerText = `Slide ${currentSlide + 1} / ${slides.length}`;
            document.getElementById('section-name').innerText = `Misi: ${slide.section}`;

            // Arrow States
            document.getElementById('prev-btn').style.opacity = currentSlide === 0 ? "0.3" : "1";
            document.getElementById('next-btn').style.opacity = currentSlide === slides.length - 1 ? "0.3" : "1";

            // Trigger Simulator Slide Action
            if (currentSlide === 14) { 
                setTimeout(drawPizza, 100);
            }

            // Trigger MathJax re-render for perfect formatting
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function changeSlide(direction) {
            const nextIdx = currentSlide + direction;
            if (nextIdx >= 0 && nextIdx < slides.length) {
                playSound('click');
                loadSlide(nextIdx);
            }
        }

        // --- 6. USER INTERACTION & VALIDATION ---
        function checkSlideAnswer(element, isCorrect, feedback, points = 10) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-emerald-50', 'border-red-400', 'bg-red-50');
            });

            if (isCorrect) {
                element.classList.add('border-emerald-500', 'bg-emerald-50');
                playSound('correct');
                showToast("✨ " + feedback, "bg-[#10B981]");
                score += points;
                document.getElementById('score-display').innerText = `${score} XP`;
                triggerConfetti();
            } else {
                element.classList.add('border-red-400', 'bg-red-50');
                playSound('incorrect');
                showToast("❌ " + feedback, "bg-red-500");
            }
        }

        function handleEmotionSelect(element, emotion) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('ring-4', 'ring-[#10B981]', 'scale-105');
            });
            element.classList.add('ring-4', 'ring-[#10B981]', 'scale-105');
            
            const feedbackText = document.getElementById('emotion-feedback');
            if (emotion === 'paham') {
                feedbackText.innerText = "Luar biasa! Operasi desimal bersusun dan penyetaraan penyebut pecahan sudah kamu kuasai secara mantap! 😎";
                playSound('correct');
                triggerConfetti();
            } else if (emotion === 'latihan') {
                feedbackText.innerText = "Semangat! Gunakan tombol 'Papan Cakar' di pojok kanan atas untuk berlatih menghitung kembali! 🧠";
                playSound('click');
            } else {
                feedbackText.innerText = "Sangat Hebat! Jiwa petualangmu siap menghadapi ujian sekolah kelak! 🚀";
                playSound('correct');
                triggerConfetti();
            }
        }

        function showToast(text, bgClass) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toast.className = `fixed bottom-12 left-1/2 transform -translate-x-1/2 z-50 text-white font-black px-6 py-3 rounded-2xl shadow-xl flex items-center gap-2 animate-bounce ${bgClass}`;
            toastText.innerHTML = text;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        function resetAdventure() {
            score = 0;
            document.getElementById('score-display').innerText = `0 XP`;
            loadSlide(0);
        }

        // --- 7. DYNAMIC PIZZA SIMULATOR ---
        function drawPizza() {
            const slices = parseInt(document.getElementById('range-slice').value);

            // Update Label texts
            document.getElementById('val-slice').innerText = slices;

            // Math conversions
            const fraction = `${slices}/8`;
            const decimal = (slices / 8).toFixed(2);
            const percent = `${((slices / 8) * 100).toFixed(0)}%`;

            document.getElementById('fdp-frac').innerText = fraction;
            document.getElementById('fdp-dec').innerText = decimal.replace('.', ',');
            document.getElementById('fdp-pct').innerText = percent;

            // Draw SVG Wedge representation
            const angleDeg = (slices / 8) * 360;
            const path = document.getElementById('svg-slice-path');

            if (slices === 8) {
                path.setAttribute('d', 'M 50 50 A 40 40 0 1 1 49.99 50 Z');
            } else {
                const angleRad = (angleDeg - 90) * Math.PI / 180;
                const endX = 50 + 40 * Math.cos(angleRad);
                const endY = 50 + 40 * Math.sin(angleRad);
                const largeArcFlag = slices > 4 ? 1 : 0;
                path.setAttribute('d', `M 50 50 L 50 10 A 40 40 0 ${largeArcFlag} 1 ${endX} ${endY} Z`);
            }
        }

        // --- 8. DOODLE CANVAS SYSTEM ---
        function toggleScratchpad() {
            const pad = document.getElementById('scratchpad');
            pad.classList.toggle('hidden');
            if (!pad.classList.contains('hidden')) {
                resizeCanvas();
            }
        }

        function initCanvas() {
            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                ctx.beginPath();
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
            });
            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('mouseup', () => isDrawing = false);

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDrawing = true;
                ctx.beginPath();
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(t.clientX - r.left, t.clientY - r.top);
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isDrawing) return;
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(t.clientX - r.left, t.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('touchend', () => isDrawing = false);
        }

        function resizeCanvas() {
            const parent = canvas.parentNode;
            canvas.width = parent.clientWidth;
            canvas.height = parent.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#10B981'; 
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // --- 9. SWIPE GESTURES ---
        let startX = 0;
        function setupTouchGestures() {
            const wrapper = document.getElementById('slide-wrapper');
            wrapper.addEventListener('touchstart', (e) => {
                startX = e.changedTouches[0].screenX;
            }, false);

            wrapper.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].screenX;
                const threshold = 60;
                if (startX - endX > threshold) {
                    changeSlide(1); 
                } else if (endX - startX > threshold) {
                    changeSlide(-1); 
                }
            }, false);
        }

        // --- STREAMING_CHUNK: Memuat animasi letupan confetti kemenangan... -->
        // --- 10. CONFETTI CELEBRATION SYSTEM ---
        function triggerConfetti() {
            confettiActive = true;
            confettiCanvas.classList.remove('hidden');
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            
            particles = [];
            for (let i = 0; i < 75; i++) {
                particles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                    r: Math.random() * 5 + 4,
                    d: Math.random() * confettiCanvas.height,
                    color: `hsl(${Math.random() * 360}, 100%, 70%)`,
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            animateConfetti();
            setTimeout(() => {
                confettiActive = false;
                confettiCanvas.classList.add('hidden');
            }, 2500);
        }

        function animateConfetti() {
            if (!confettiActive) return;
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            
            particles.forEach((p, idx) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - idx / 3) * 15;

                confettiCtx.beginPath();
                confettiCtx.lineWidth = p.r;
                confettiCtx.strokeStyle = p.color;
                confettiCtx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                confettiCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                confettiCtx.stroke();
            });

            requestAnimationFrame(animateConfetti);
        }
    </script>
</body>
</html>
